---
jobs:
  build:
    runs-on: ${{ matrix.arch.runner }}
    steps:
      - id: fixed_workspace
        name: Fix path
        run: >-
          echo out=$("${{github.workspace}}" -Replace "\\","/") | Out-File
          -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install NSIS
        run: choco install nsis -y --no-progress
      - name: Configure
        run: >-
          cmake -B ${{github.workspace}}/build
          --install-prefix ${{github.workspace}}/build/prefix
          -A ${{matrix.arch.cmake_platform}}
          -DCMAKE_BUILD_TYPE=${{matrix.build-type}}
          -DCMAKE_INTERPROCEDURAL_OPTIMIZATION=ON
          -DCPACK_SYSTEM_NAME=${{matrix.arch.cpack_system}}
      - name: Build
        run: cmake --build ${{github.workspace}}/build --verbose --config ${{matrix.build-type}}
      - name: Install
        run: cmake --install ${{github.workspace}}/build --config ${{matrix.build-type}} --verbose
      - name: Configure Git
        run: |
          git config --global user.email "you@example.com"
          git config --global user.name "Your Name"
      - name: Crash test
        run: ${{github.workspace}}/build/prefix/bin/winprefs.exe -c -d
      - name: Show Git log of export
        run: |
          cd "${env:APPDATA}/prefs-export"
          git --no-pager log
      - name: Package
        run: >-
          cpack -C ${{matrix.build-type}}
          --config ${{github.workspace}}/build/CPackConfig.cmake --verbose
      - name: Encode build type into package filenames
        run: |
          Get-ChildItem -LiteralPath "${{github.workspace}}" -File |
            Where-Object { $_.Name -like 'winprefs-*' -and ($_.Extension -in '.exe', '.zip') } |
            ForEach-Object {
              $target = $_.BaseName + '-${{matrix.build-type}}' + $_.Extension
              Rename-Item -LiteralPath $_.FullName -NewName $target
            }
      - name: 'Upload Artifacts'
        uses: 'actions/upload-artifact@v7'
        with:
          if-no-files-found: error
          name: winprefs-${{ matrix.build-type }}-${{ matrix.arch.name }}
          path: |
            ${{steps.fixed_workspace.outputs.out}}/winprefs-*.exe
            ${{steps.fixed_workspace.outputs.out}}/winprefs-*.zip
      - name: Attest
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            ${{steps.fixed_workspace.outputs.out}}/winprefs-*.exe
            ${{steps.fixed_workspace.outputs.out}}/winprefs-*.zip
      - if: ${{ github.ref_type == 'tag' }}
        name: Upload package
        uses: softprops/action-gh-release@v3
        with:
          draft: true
          fail_on_unmatched_files: true
          files: |
            ${{steps.fixed_workspace.outputs.out}}/winprefs-*.exe
            ${{steps.fixed_workspace.outputs.out}}/winprefs-*.zip
    strategy:
      fail-fast: false
      matrix:
        arch:
          - cmake_platform: x64
            cpack_system: win64
            name: x64
            runner: windows-latest
          - cmake_platform: ARM64
            cpack_system: winarm64
            name: arm64
            runner: windows-11-arm
        build-type: [Debug, Release]
  build-msys:
    runs-on: ${{ matrix.sys.runner }}
    steps:
      - id: fixed_workspace
        name: Fix path
        run: >-
          echo out=$("${{github.workspace}}" -Replace "\\","/") | Out-File
          -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
      - if: matrix.sys.name == 'clangarm64'
        name: Install NSIS via Chocolatey
        run: |
          choco install nsis -y --no-progress
          'C:\Program Files (x86)\NSIS' | Out-File -Append -Encoding utf8 -FilePath $env:GITHUB_PATH
      - uses: msys2/setup-msys2@v2
        with:
          install: >-
            make
          msystem: ${{matrix.sys.name}}
          pacboy: >-
            cmake:p
            ninja:p
            ${{ matrix.sys.name == 'clangarm64' && ' ' || 'nsis:p' }}
            toolchain:p
          update: true
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Configure
        run: >-
          cmake -G Ninja -B ${{steps.fixed_workspace.outputs.out}}/build
          --install-prefix ${{steps.fixed_workspace.outputs.out}}/build/prefix
          -DCMAKE_BUILD_TYPE=${{matrix.build-type}}
          -DCPACK_SYSTEM_NAME=${{matrix.sys.cpack_system}}
        shell: msys2 {0}
      - name: Build
        run: cmake --build ${{steps.fixed_workspace.outputs.out}}/build --verbose
        shell: msys2 {0}
      - name: Install
        run: >-
          cmake --install ${{steps.fixed_workspace.outputs.out}}/build
          --config ${{matrix.build-type}} --verbose
        shell: msys2 {0}
      - name: Package
        run: >-
          cpack -C ${{matrix.build-type}}
          --config ${{steps.fixed_workspace.outputs.out}}/build/CPackConfig.cmake --verbose
        shell: msys2 {0}
      - name: Encode build type into package filenames
        shell: msys2 {0}
        run: |
          cd "${{steps.fixed_workspace.outputs.out}}"
          shopt -s nullglob
          for f in winprefs-*.exe winprefs-*.zip; do
            mv -- "$f" "${f%.*}-${{matrix.build-type}}.${f##*.}"
          done
      - name: 'Upload Artifacts'
        uses: 'actions/upload-artifact@v7'
        with:
          if-no-files-found: error
          name: winprefs-${{ matrix.build-type }}-${{ matrix.sys.name }}
          path: |
            ${{github.workspace}}/winprefs-*.exe
            ${{github.workspace}}/winprefs-*.zip
      - name: Attest
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            ${{github.workspace}}/winprefs-*.exe
            ${{github.workspace}}/winprefs-*.zip
      - if: ${{ github.ref_type == 'tag' && matrix.sys.release }}
        name: Upload package
        uses: softprops/action-gh-release@v3
        with:
          draft: true
          fail_on_unmatched_files: true
          files: |
            ${{github.workspace}}/winprefs-*.exe
            ${{github.workspace}}/winprefs-*.zip
    strategy:
      fail-fast: false
      matrix:
        build-type: [Debug, Release]
        sys:
          - cpack_system: win32
            env: i686
            name: mingw32
            release: true
            runner: windows-latest
          - cpack_system: win64
            env: x86_64
            name: mingw64
            release: false
            runner: windows-latest
          - cpack_system: win64
            env: ucrt-x86_64
            name: ucrt64
            release: false
            runner: windows-latest
          - cpack_system: winarm64
            env: clang-aarch64
            name: clangarm64
            release: false
            runner: windows-11-arm
  build-cross:
    runs-on: ubuntu-latest
    steps:
      - name: Set up MinGW
        uses: egor-tensin/setup-mingw@v3
        with:
          platform: x64
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Configure
        run: >-
          cmake -B ${{github.workspace}}/build
          -DCMAKE_BUILD_TYPE=${{matrix.build-type}}
          -DCMAKE_BUILD_WITH_INSTALL_RPATH=ON
          -DCMAKE_C_COMPILER=x86_64-w64-mingw32-gcc
          -DCMAKE_SYSTEM_NAME=Windows
          -DCMAKE_INTERPROCEDURAL_OPTIMIZATION=ON
      - name: Build
        run: cmake --build ${{github.workspace}}/build --config ${{matrix.build-type}} --verbose
      - name: Package
        run: >-
          cpack -G ZIP -C ${{matrix.build-type}}
          --config ${{github.workspace}}/build/CPackConfig.cmake --verbose
      - name: 'Upload Artifacts'
        uses: 'actions/upload-artifact@v7'
        with:
          if-no-files-found: error
          name: winprefs-${{ matrix.build-type }}-cross
          path: |
            ${{github.workspace}}/winprefs-*.exe
            ${{github.workspace}}/winprefs-*.zip
      - name: Attest
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            ${{github.workspace}}/winprefs-*.exe
            ${{github.workspace}}/winprefs-*.zip
    strategy:
      fail-fast: false
      matrix:
        build-type: [Debug, Release]
name: Build
'on':
  push:
    branches: [master]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [master]
permissions:
  attestations: write
  contents: write
  id-token: write
